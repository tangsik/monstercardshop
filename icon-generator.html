<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Monster Card Shop — Icon Generator</title>
<style>
  body { background:#111; color:#eee; font-family:sans-serif; text-align:center; padding:20px; }
  #preview { width:320px; height:320px; border-radius:40px; margin:20px auto; display:block;
             box-shadow:0 8px 32px rgba(0,0,0,0.8); border:2px solid #cdb184; }
  button { margin:8px; padding:12px 24px; font-size:15px; background:#43301f; color:#fff;
           border:2px solid #cdb184; border-radius:8px; cursor:pointer; }
  button:hover { background:#6b4c30; }
  button:disabled { opacity:0.4; cursor:default; }
  #status { color:#aaa; font-size:13px; margin:8px 0; }
  canvas { display:none; }
</style>
</head>
<body>
<h2>Monster Card Shop — Icon Generator</h2>
<img id="preview" alt="로딩 중...">
<div id="status">이미지 로딩 중...</div>
<br>
<button id="btn-icon"   disabled>icon-source.png   (1024×1024) 다운로드</button>
<button id="btn-splash" disabled>splash-source.png (2732×2732) 다운로드</button>
<canvas id="c"></canvas>

<script>
const SRC = {
  char:   'assets/characters/man_staff.png',
  legend: 'assets/packs/Legend.png',
  epic:   'assets/packs/Epic.png',
  rare:   'assets/packs/Rare.png',
};
const imgs = {};
let done = 0;
const keys = Object.keys(SRC);
keys.forEach(k => {
  const img = new Image();
  img.onload  = () => { imgs[k] = img; if (++done===keys.length) onReady(); };
  img.onerror = () => { imgs[k] = null; if (++done===keys.length) onReady(); };
  img.src = SRC[k];
});

function rr(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}
function star(ctx,cx,cy,R,r,n,fill,glow){
  ctx.save();
  if(glow){ctx.shadowColor=glow;ctx.shadowBlur=R*.9;}
  ctx.beginPath();
  for(let i=0;i<n*2;i++){
    const rad=i%2===0?R:r,a=i*Math.PI/n-Math.PI/2;
    i===0?ctx.moveTo(cx+rad*Math.cos(a),cy+rad*Math.sin(a))
         :ctx.lineTo(cx+rad*Math.cos(a),cy+rad*Math.sin(a));
  }
  ctx.closePath();ctx.fillStyle=fill;ctx.fill();ctx.restore();
}

// multiply + screen 2패스로 흰 배경 제거 + 색상 복원
function drawChar(ctx,img,x,y,w,h){
  if(!img)return;
  ctx.save(); ctx.globalCompositeOperation='multiply';
  ctx.drawImage(img,x,y,w,h); ctx.restore();
  ctx.save(); ctx.globalCompositeOperation='screen'; ctx.globalAlpha=0.55;
  ctx.drawImage(img,x,y,w,h); ctx.restore();
  ctx.save(); ctx.globalAlpha=0.28;
  ctx.drawImage(img,x,y,w,h); ctx.restore();
}

function drawCard(ctx,img,tx,ty,angle,cw,ch,glow){
  if(!img)return;
  ctx.save();
  ctx.translate(tx,ty); ctx.rotate(angle);
  ctx.shadowColor=glow; ctx.shadowBlur=26;
  ctx.drawImage(img,-cw/2,0,cw,ch);
  ctx.restore();
}

// ── 아이콘 ────────────────────────────────────────────────────────────────────
function drawIcon(canvas, SIZE){
  const ctx=canvas.getContext('2d');
  canvas.width=canvas.height=SIZE;
  const S=SIZE/1024;

  // 배경
  const bg=ctx.createRadialGradient(SIZE*.5,SIZE*.44,SIZE*.03,SIZE*.5,SIZE*.44,SIZE*.74);
  bg.addColorStop(0,'#2e1d0e'); bg.addColorStop(1,'#17101f');
  ctx.fillStyle=bg; ctx.fillRect(0,0,SIZE,SIZE);

  // 바닥
  const fy=SIZE*.82;
  ctx.fillStyle='#1a0e06'; ctx.fillRect(0,fy,SIZE,SIZE-fy);
  ctx.save(); ctx.globalAlpha=0.22;
  for(let i=0;i<4;i++){ctx.fillStyle=i%2===0?'#5a3010':'#0e0804';ctx.fillRect(0,fy+i*(SIZE-fy)/4,SIZE,(SIZE-fy)/4);}
  ctx.restore();

  // 간판
  const sw=SIZE*.86,sh=SIZE*.12,sx=(SIZE-sw)/2,sy=SIZE*.035;
  rr(ctx,sx,sy,sw,sh,S*20);
  const sg=ctx.createLinearGradient(sx,sy,sx,sy+sh);
  sg.addColorStop(0,'#5a3a18'); sg.addColorStop(1,'#2e1c0a');
  ctx.fillStyle=sg; ctx.fill();
  ctx.strokeStyle='#cdb184'; ctx.lineWidth=S*6; ctx.stroke();
  ctx.save();
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font=`900 ${S*48}px 'Arial Black',Arial,sans-serif`;
  ctx.fillStyle='#ffeaa0'; ctx.shadowColor='#000'; ctx.shadowBlur=S*10;
  ctx.fillText('MONSTER CARD SHOP',SIZE*.5,sy+sh*.52);
  ctx.restore();

  // ──────────────────────────────────────────────────────────
  // 구도 계획:
  //   캐릭터: 상체(머리+몸) 위쪽, 손이 화면 중간 정도에 위치
  //   카드:   손 위치에서 시작해 아래로 펼침 (캐릭터 위에 그려 "앞으로 내밀기")
  //   캐릭터 상체 재렌더: 카드 위에 머리/어깨 다시 그려서 "카드 쥔 손" 표현
  // ──────────────────────────────────────────────────────────

  // 캐릭터: 꽉 채우기 — 가로 넓게, 세로 바닥까지
  const charW = S*520, charH = S*650;
  const charX = (SIZE-charW)/2;
  const charY = SIZE*0.17;   // 아래로 내림

  // 손 위치: 캐릭터 세로 57%
  const handY  = charY + charH*0.57;
  const cardOffX = S*30, cardOffY = S*0;
  const leftHX = charX + charW*0.18 + cardOffX;
  const rightHX= charX + charW*0.82 + cardOffX;
  const ctrHX  = charX + charW*0.50 + cardOffX;
  const cw=S*195, ch=S*253;

  // ── 1. 캐릭터 전체 (카드 아래층) ─────────────────────
  drawChar(ctx, imgs.char, charX, charY, charW, charH);

  // ── 2. 카드 (캐릭터 손 위치에서 펼침) ────────────────
  drawCard(ctx, imgs.rare,   leftHX,  handY, -32*Math.PI/180, cw,ch,'#44ff88');
  drawCard(ctx, imgs.epic,   rightHX, handY,  32*Math.PI/180, cw,ch,'#cc44ff');
  drawCard(ctx, imgs.legend, ctrHX,   handY+S*5, 0,           cw,ch,'#ffaa00');

  // ── 3. 캐릭터 상체 재렌더 (머리+몸통이 카드 위로 나옴) ─
  ctx.save();
  ctx.beginPath();
  ctx.rect(charX - S*20, charY - S*5, charW + S*40, charH*0.53);
  ctx.clip();
  drawChar(ctx, imgs.char, charX, charY, charW, charH);
  ctx.restore();

  // 별
  star(ctx,SIZE*.14,SIZE*.22,S*26,S*11,5,'#ffd700','#ffaa00');
  star(ctx,SIZE*.86,SIZE*.22,S*21,S*9, 5,'#ffd700','#ffaa00');
  star(ctx,SIZE*.50,SIZE*.20,S*16,S*7, 5,'#fffaaa','#ffff88');

  // 바닥선
  ctx.save();ctx.strokeStyle='#cdb184';ctx.lineWidth=S*3;ctx.globalAlpha=0.4;
  ctx.beginPath();ctx.moveTo(SIZE*.06,fy);ctx.lineTo(SIZE*.94,fy);ctx.stroke();ctx.restore();
}

// ── 스플래시 ──────────────────────────────────────────────────────────────────
function drawSplash(canvas,SIZE){
  const ctx=canvas.getContext('2d');
  canvas.width=canvas.height=SIZE;
  const S=SIZE/1024;

  ctx.fillStyle='#17101f'; ctx.fillRect(0,0,SIZE,SIZE);
  const glow=ctx.createRadialGradient(SIZE/2,SIZE/2,SIZE*.03,SIZE/2,SIZE/2,SIZE*.5);
  glow.addColorStop(0,'rgba(80,50,15,0.55)'); glow.addColorStop(1,'rgba(23,16,31,0)');
  ctx.fillStyle=glow; ctx.fillRect(0,0,SIZE,SIZE);

  const iSz=SIZE*.42,iCX=SIZE/2,iCY=SIZE*.46,iR=iSz/2;
  ctx.save();
  ctx.beginPath(); ctx.arc(iCX,iCY,iR,0,Math.PI*2);
  const cb=ctx.createRadialGradient(iCX,iCY-iR*.1,iR*.04,iCX,iCY,iR);
  cb.addColorStop(0,'#3a2412'); cb.addColorStop(1,'#1e1228');
  ctx.fillStyle=cb; ctx.fill();
  ctx.strokeStyle='#cdb184'; ctx.lineWidth=S*12; ctx.stroke();
  ctx.restore();

  ctx.save();
  ctx.beginPath(); ctx.arc(iCX,iCY,iR-S*8,0,Math.PI*2); ctx.clip();

  const iS=iSz/1024;
  const charW=iS*520*1024,charH=iS*650*1024;
  const charX=iCX-charW/2,charY=iCY-iSz*.48;
  const cw=iS*195*1024,ch=iS*253*1024;
  const handY=charY+charH*.57;
  const cardOffX=iS*30*1024;
  const leftHX=charX+charW*.18+cardOffX,rightHX=charX+charW*.82+cardOffX,ctrHX=charX+charW*.50+cardOffX;

  drawChar(ctx,imgs.char,charX,charY,charW,charH);

  drawCard(ctx,imgs.rare,  leftHX, handY,-32*Math.PI/180,cw,ch,'#44ff88');
  drawCard(ctx,imgs.epic,  rightHX,handY, 32*Math.PI/180,cw,ch,'#cc44ff');
  drawCard(ctx,imgs.legend,ctrHX,  handY+iS*5*1024,0,   cw,ch,'#ffaa00');

  // 상체 재렌더
  ctx.save();
  ctx.beginPath();
  ctx.rect(charX-iS*20*1024,charY-iS*5*1024,charW+iS*40*1024,charH*.53);
  ctx.clip();
  drawChar(ctx,imgs.char,charX,charY,charW,charH);
  ctx.restore();

  ctx.restore();

  const ty=SIZE*.73;
  ctx.save(); ctx.textAlign='center'; ctx.shadowColor='#000'; ctx.shadowBlur=S*24;
  ctx.font=`900 ${S*148}px 'Arial Black',Arial,sans-serif`;
  ctx.fillStyle='#ffeaa0'; ctx.fillText('MONSTER',SIZE/2,ty);
  ctx.font=`900 ${S*100}px 'Arial Black',Arial,sans-serif`;
  ctx.fillStyle='#cdb184'; ctx.fillText('CARD  SHOP',SIZE/2,ty+S*164);
  ctx.restore();

  star(ctx,SIZE*.18,SIZE*.22,S*30,S*13,5,'#ffd700','#ffaa00');
  star(ctx,SIZE*.82,SIZE*.22,S*24,S*10,5,'#ffd700','#ffaa00');
}

// ── 초기화 ───────────────────────────────────────────────────────────────────
function onReady(){
  const n=Object.values(imgs).filter(Boolean).length;
  document.getElementById('status').textContent=`✓ 이미지 ${n}/${keys.length} 로드 완료`;
  const canvas=document.getElementById('c');
  try{
    drawIcon(canvas,320);
    document.getElementById('preview').src=canvas.toDataURL('image/png');
    document.getElementById('btn-icon').disabled=false;
    document.getElementById('btn-splash').disabled=false;
    document.getElementById('btn-icon').onclick=()=>{ drawIcon(canvas,1024); dl('icon-source.png'); };
    document.getElementById('btn-splash').onclick=()=>{ drawSplash(canvas,2732); dl('splash-source.png'); };
  }catch(e){
    document.getElementById('status').textContent='오류: '+e.message;
    document.getElementById('status').style.color='#f55';
    console.error(e);
  }
}
function dl(name){
  const a=document.createElement('a');
  try{ a.href=document.getElementById('c').toDataURL('image/png'); }
  catch(e){ alert('저장 오류: '+e.message); return; }
  a.download=name; a.click();
}
</script>
</body>
</html>
